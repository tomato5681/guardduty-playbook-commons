id: Test-Playbook
version: "1.0.0"
finding_type: "TestFinding/Type"
severity: [HIGH]
description: "Test playbook for unit tests"
references:
  - https://example.com/docs
triage:
  - step: "Check the test resource"
    how: "aws sts get-caller-identity"
investigation:
  queries:
    - name: "Test query"
      type: athena
      template: |
        SELECT * FROM test_table WHERE id = '{principal_id}'
containment:
  automated: false
  actions:
    - id: test_action
      description: "Test containment action"
      aws_cli: "aws iam list-users"
      requires_confirmation: true
escalation:
  notify:
    - channel: slack
      condition: "severity == HIGH"
      message: "Test alert: {finding_type}"
  page:
    condition: "severity == CRITICAL"
variables:
  - name: principal_id
    source: finding.resource.testField
  - name: account_id
    source: finding.accountId
  - name: region
    source: finding.region
