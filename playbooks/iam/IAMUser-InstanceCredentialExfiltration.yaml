id: iam-user-instance-credential-exfiltration
version: "1.0.0"
finding_type: "IAMUser/InstanceCredentialExfiltration.OutsideAWS"
severity: [HIGH, CRITICAL]
description: >
  Credentials created exclusively for an EC2 instance through an instance
  metadata service role are being used from an IP address outside of AWS.
  This indicates that the instance's temporary credentials have been
  exfiltrated and are being used by an external actor.
references:
  - https://docs.aws.amazon.com/guardduty/latest/ug/guardduty_finding-types-iam.html#iamuserinstancecredentialexfiltrationoutsideaws
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_use_revoke-sessions.html

triage:
  - step: "Identify the EC2 instance whose credentials were exfiltrated"
    how: >
      Extract the instance ID from finding.resource.instanceDetails.instanceId
      and the role name from accessKeyDetails.userName. Identify the instance
      owner via tags (e.g., Owner, Team, Application). Determine what the
      instance is used for and whether credential usage from outside AWS
      could be legitimate (e.g., hybrid workloads, VPN tunnels).
  - step: "Check if the external IP is a known corporate egress or VPN endpoint"
    how: >
      Compare the remoteIpDetails.ipAddressV4 from the finding against your
      organization's known egress IP ranges (corporate offices, VPNs, NAT
      gateways in other accounts). If the IP matches a known egress, this
      may be a false positive from a legitimate proxy or bastion pattern.
  - step: "Assess the scope of API calls made with the exfiltrated credentials"
    how: >
      Review the finding's service.action.awsApiCallAction to see which
      API was called. Check CloudTrail for the full set of API calls made
      with the specific access key ID to understand the blast radius.

investigation:
  queries:
    - name: "All API calls using the exfiltrated temporary credentials"
      type: athena
      template: |
        SELECT eventTime, eventSource, eventName, sourceIPAddress,
               userAgent, errorCode, errorMessage,
               requestParameters, responseElements
        FROM cloudtrail_logs
        WHERE userIdentity.accessKeyId = '{{ access_key_id }}'
          AND recipientAccountId = '{{ account_id }}'
          AND eventTime > DATE_ADD('day', -7, NOW())
        ORDER BY eventTime DESC
        LIMIT 1000
    - name: "Calls from non-AWS IP addresses using instance role credentials"
      type: athena
      template: |
        SELECT sourceIPAddress, eventName, eventSource,
               COUNT(*) as call_count,
               MIN(eventTime) as first_seen,
               MAX(eventTime) as last_seen
        FROM cloudtrail_logs
        WHERE userIdentity.accessKeyId = '{{ access_key_id }}'
          AND recipientAccountId = '{{ account_id }}'
          AND sourceIPAddress NOT LIKE '%.internal'
          AND eventTime > DATE_ADD('day', -7, NOW())
        GROUP BY sourceIPAddress, eventName, eventSource
        ORDER BY call_count DESC

containment:
  automated: false
  actions:
    - id: revoke-role-active-sessions
      description: >
        Revoke all active sessions for the IAM role by adding an inline policy
        that denies all actions for tokens issued before the current time.
        This invalidates all existing temporary credentials without affecting
        new ones issued after this policy is applied.
      aws_cli: >
        aws iam put-role-policy
        --role-name '{{ principal_id }}'
        --policy-name 'GuardDuty-RevokeOldSessions'
        --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Deny","Action":"*","Resource":"*","Condition":{"DateLessThan":{"aws:TokenIssueTime":"{{ now_iso8601 }}"}}}]}'
        --region {{ region }}
      requires_confirmation: true
    - id: replace-instance-profile-role
      description: >
        Disassociate the compromised role from the instance profile and
        associate a minimal replacement role. The instance will get fresh
        credentials that the attacker does not have.
      aws_cli: >
        aws ec2 describe-iam-instance-profile-associations
        --filters 'Name=instance-id,Values={{ instance_id }}'
        --query 'IamInstanceProfileAssociations[0].AssociationId'
        --output text
        --region {{ region }}
      requires_confirmation: true
    - id: isolate-ec2-instance
      description: "Replace the instance's security groups with an empty isolation group that blocks all traffic"
      aws_cli: >
        aws ec2 modify-instance-attribute
        --instance-id '{{ instance_id }}'
        --groups '{{ isolation_sg_id }}'
        --region {{ region }}
      requires_confirmation: true

escalation:
  notify:
    - channel: slack
      condition: "severity in ['HIGH', 'CRITICAL']"
      message: >
        CREDENTIAL EXFILTRATION: EC2 instance {{ instance_id }} role credentials
        ({{ principal_id }}) used from external IP in account {{ account_id }}
        ({{ region }}). Access key: {{ access_key_id }}. Immediate investigation required.
  page:
    condition: "severity == 'CRITICAL'"

variables:
  - name: principal_id
    source: finding.resource.accessKeyDetails.userName
  - name: instance_id
    source: finding.resource.instanceDetails.instanceId
  - name: access_key_id
    source: finding.resource.accessKeyDetails.accessKeyId
  - name: account_id
    source: finding.accountId
  - name: region
    source: finding.region
  - name: now_iso8601
    source: runtime.now_iso8601
