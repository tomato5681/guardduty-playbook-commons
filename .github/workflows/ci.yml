name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate all playbooks
        run: gdpc validate playbooks/

      - name: Run tests
        run: pytest -v

      - name: Check formatting
        run: |
          ruff check .
          ruff format --check .
